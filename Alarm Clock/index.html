<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm Clock</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --card:      #1e1e35;
      --border:    #2a2a48;
      --accent:    #7c6af7;
      --accent2:   #f7716a;
      --accent3:   #6af7c8;
      --text:      #e8e8f0;
      --muted:     #8080a8;
      --on:        #6af7c8;
      --off:       #444460;
      --ring:      #f7c06a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LAYOUT ── */
    .app { max-width: 480px; margin: 0 auto; padding: 0 16px 120px; }

    /* ── HEADER CLOCK ── */
    .clock-section {
      text-align: center;
      padding: 48px 0 32px;
      position: relative;
    }
    .clock-ring {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 24px;
    }
    .clock-ring svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .clock-face {
      position: absolute;
      inset: 14px;
      background: var(--surface);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
    #time-display {
      font-family: 'Space Mono', monospace;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }
    #ampm-display {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent);
      margin-top: 4px;
      letter-spacing: 2px;
    }
    #date-display {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .next-alarm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 8px;
    }
    .next-alarm-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 16px 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(124,106,247,0.4);
      transition: transform .15s, box-shadow .15s;
      z-index: 100;
    }
    .fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 40px rgba(124,106,247,.55); }
    .fab:active { transform: translateX(-50%) translateY(0); }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding: 0 4px;
    }

    /* ── ALARM CARDS ── */
    .alarms-section { margin-top: 8px; }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 0.9rem; }

    .alarm-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .alarm-card.active {
      border-color: rgba(106,247,200,.25);
    }
    .alarm-card.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--on);
      border-radius: 3px 0 0 3px;
    }
    .alarm-card.ringing {
      border-color: var(--ring);
      animation: ring-pulse .6s infinite alternate;
    }
    @keyframes ring-pulse {
      from { box-shadow: 0 0 0 0 rgba(247,192,106,0.2); }
      to   { box-shadow: 0 0 0 8px rgba(247,192,106,0); }
    }
    .alarm-time-block { flex: 1; }
    .alarm-time {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    .alarm-time .ampm {
      font-size: 0.9rem;
      color: var(--muted);
      margin-left: 4px;
    }
    .alarm-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .alarm-label .tone-icon { margin-right: 4px; }
    .alarm-controls { display: flex; align-items: center; gap: 12px; }
    .alarm-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color .15s, background .15s;
      line-height: 1;
    }
    .alarm-delete:hover { color: var(--accent2); background: rgba(247,113,106,.1); }

    /* ── TOGGLE ── */
    .toggle {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--off);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--on); }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 24px 40px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.22,.61,.36,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    /* ── TIME PICKER ── */
    .time-picker-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 28px;
    }
    .time-picker-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .time-picker-col .tp-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .time-picker-col .tp-btn:hover { color: var(--accent); background: rgba(124,106,247,.1); }
    .time-val {
      font-family: 'Space Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      color: var(--text);
      width: 90px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 0;
      cursor: default;
      user-select: none;
    }
    .time-sep { font-family: 'Space Mono', monospace; font-size: 2.4rem; font-weight: 700; color: var(--muted); padding-bottom: 4px; }
    .ampm-picker {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ampm-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all .15s;
    }
    .ampm-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── LABEL INPUT ── */
    .field-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .text-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    .text-input:focus { border-color: var(--accent); }

    /* ── TONE PICKER ── */
    .tones-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 28px;
    }
    .tone-option {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      transition: all .15s;
    }
    .tone-option:hover { border-color: var(--accent); }
    .tone-option.selected { background: rgba(124,106,247,.12); border-color: var(--accent); color: var(--accent); }
    .tone-icon { font-size: 1.2rem; }

    /* ── SAVE BUTTON ── */
    .save-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .save-btn:hover { opacity: .9; }
    .save-btn:active { transform: scale(.99); }

    /* ── RINGING OVERLAY ── */
    .ringing-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,26,.95);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ringing-overlay.open { display: flex; }
    .ringing-icon {
      font-size: 6rem;
      animation: shake .3s infinite alternate;
    }
    @keyframes shake {
      from { transform: rotate(-12deg); }
      to   { transform: rotate(12deg); }
    }
    .ringing-time {
      font-family: 'Space Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
    }
    .ringing-label { color: var(--muted); font-size: 1.1rem; }
    .ringing-actions { display: flex; gap: 16px; margin-top: 12px; }
    .ringing-btn {
      border: none;
      border-radius: 50px;
      padding: 16px 36px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, opacity .15s;
    }
    .ringing-btn:active { transform: scale(.97); }
    .snooze-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .dismiss-btn { background: var(--accent2); color: #fff; }
    .snooze-btn:hover { border-color: var(--accent); }

    /* ── INSTALL BANNER ── */
    .install-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .install-banner-icon { font-size: 1.8rem; flex-shrink: 0; }
    .install-banner-text { flex: 1; }
    .install-banner-text strong { display: block; font-size: 0.9rem; margin-bottom: 2px; }
    .install-banner-text span { font-size: 0.78rem; color: var(--muted); }
    .install-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .install-btn:hover { opacity: .85; }
    .install-banner.hidden { display: none; }

    @media (prefers-reduced-motion: reduce) {
      .ringing-icon { animation: none; }
      .alarm-card.ringing { animation: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Clock -->
  <section class="clock-section">
    <div class="clock-ring">
      <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <circle cx="110" cy="110" r="100" fill="none" stroke="#1a1a2e" stroke-width="8"/>
        <circle id="second-arc" cx="110" cy="110" r="100" fill="none"
          stroke="#7c6af7" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="628.3" stroke-dashoffset="628.3"
          transform="rotate(-90 110 110)"/>
        <circle id="minute-arc" cx="110" cy="110" r="92" fill="none"
          stroke="#6af7c8" stroke-width="2" stroke-linecap="round"
          stroke-dasharray="578" stroke-dashoffset="578"
          transform="rotate(-90 110 110)" opacity=".5"/>
      </svg>
      <div class="clock-face">
        <div id="time-display">12:00</div>
        <div id="ampm-display">AM</div>
      </div>
    </div>
    <div id="date-display">Loading…</div>
    <div id="next-alarm-info" class="next-alarm-badge" style="display:none">
      <span class="dot"></span>
      <span id="next-alarm-text">Next alarm</span>
    </div>
  </section>

  <!-- Install Banner -->
  <div class="install-banner hidden" id="install-banner">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <strong>Install Alarm Clock</strong>
      <span>Add to home screen for offline access</span>
    </div>
    <button class="install-btn" id="install-btn">Install</button>
  </div>

  <!-- Alarms List -->
  <section class="alarms-section">
    <div class="section-label">Your Alarms</div>
    <div id="alarms-list">
      <div class="empty-state">
        <div class="empty-icon">⏰</div>
        <p>No alarms yet.<br>Tap the button below to add one.</p>
      </div>
    </div>
  </section>

</div>

<!-- Add Alarm FAB -->
<button class="fab" id="open-modal-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Add Alarm
</button>

<!-- Add / Edit Alarm Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">New Alarm</div>

    <!-- Time picker -->
    <div class="time-picker-row">
      <div class="time-picker-col">
        <button class="tp-btn" id="hr-up">▲</button>
        <div class="time-val" id="tp-hour">12</div>
        <button class="tp-btn" id="hr-down">▼</button>
      </div>
      <div class="time-sep">:</div>
      <div class="time-picker-col">
        <button class="tp-btn" id="min-up">▲</button>
        <div class="time-val" id="tp-min">00</div>
        <button class="tp-btn" id="min-down">▼</button>
      </div>
      <div class="ampm-picker">
        <button class="ampm-btn selected" id="ampm-am">AM</button>
        <button class="ampm-btn" id="ampm-pm">PM</button>
      </div>
    </div>

    <!-- Label -->
    <div class="field-label">Label</div>
    <input type="text" class="text-input" id="alarm-label-input" placeholder="e.g. Morning workout" maxlength="40" />

    <!-- Tone -->
    <div class="field-label">Alarm Tone</div>
    <div class="tones-grid" id="tone-picker"></div>

    <button class="save-btn" id="save-alarm-btn">Set Alarm</button>
  </div>
</div>

<!-- Ringing Overlay -->
<div class="ringing-overlay" id="ringing-overlay">
  <div class="ringing-icon">⏰</div>
  <div class="ringing-time" id="ringing-time-display">7:00 AM</div>
  <div class="ringing-label" id="ringing-label-display">Alarm</div>
  <div class="ringing-actions">
    <button class="ringing-btn snooze-btn" id="snooze-btn">💤 Snooze 5 min</button>
    <button class="ringing-btn dismiss-btn" id="dismiss-btn">✓ Dismiss</button>
  </div>
</div>

<script>
// ── TONES ──────────────────────────────────────────────────────────────
const TONES = [
  { id: 'beep',    label: 'Classic Beep',  icon: '🔔', freq: [880,0,880,0] },
  { id: 'chime',   label: 'Chime',         icon: '🎵', freq: [523,659,784,1047] },
  { id: 'pulse',   label: 'Pulse',         icon: '📳', freq: [440,440,440,440] },
  { id: 'digital', label: 'Digital',       icon: '📟', freq: [1200,800,1200,800] },
  { id: 'gentle',  label: 'Gentle Rise',   icon: '🌅', freq: [300,400,500,600] },
  { id: 'alarm',   label: 'Loud Alarm',    icon: '🚨', freq: [1500,0,1500,0] },
];

// ── STATE ──────────────────────────────────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
let editingId = null;
let pickerHour = 7, pickerMin = 0, pickerAmPm = 'AM';
let selectedTone = TONES[0].id;
let ringInterval = null;
let audioCtx = null;
let ringSnoozeTarget = null;
let deferredPrompt = null;

// ── AUDIO ──────────────────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(toneId, loop) {
  const tone = TONES.find(t => t.id === toneId) || TONES[0];
  let step = 0;
  const ctx = getAudioCtx();

  const play = () => {
    const freq = tone.freq[step % tone.freq.length];
    step++;
    if (!freq) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = toneId === 'chime' ? 'sine' : 'square';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  };

  play();
  if (loop) {
    ringInterval = setInterval(play, 400);
  }
}

function stopRing() {
  if (ringInterval) { clearInterval(ringInterval); ringInterval = null; }
}

// ── CLOCK ──────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('time-display').textContent =
    String(h12).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  document.getElementById('ampm-display').textContent = ampm;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  // Arcs
  const secPct = s / 60;
  const minPct = (m + s/60) / 60;
  const secArc = document.getElementById('second-arc');
  const minArc = document.getElementById('minute-arc');
  secArc.style.strokeDashoffset = 628.3 - (628.3 * secPct);
  minArc.style.strokeDashoffset = 578 - (578 * minPct);

  // Check alarms
  checkAlarms(h, m, s);
  updateNextAlarm();
}

// ── ALARM CHECK ────────────────────────────────────────────────────────
let firedThisMinute = new Set();

function checkAlarms(h, m, s) {
  if (s !== 0) return; // fire at top of minute
  const key = `${h}:${m}`;
  if (firedThisMinute.has(key)) return;

  alarms.forEach(a => {
    if (!a.enabled) return;
    const ah = a.ampm === 'PM' ? (a.hour % 12) + 12 : a.hour % 12;
    if (ah === h && a.min === m) {
      firedThisMinute.add(key);
      triggerAlarm(a);
    }
  });
}

function triggerAlarm(alarm) {
  playTone(alarm.tone, true);
  const fmt = alarm.hour + ':' + String(alarm.min).padStart(2,'0') + ' ' + alarm.ampm;
  document.getElementById('ringing-time-display').textContent = fmt;
  document.getElementById('ringing-label-display').textContent = alarm.label || 'Alarm';
  document.getElementById('ringing-overlay').classList.add('open');
  ringSnoozeTarget = alarm;

  // Auto-dismiss after 2 minutes
  setTimeout(() => {
    if (document.getElementById('ringing-overlay').classList.contains('open')) {
      dismissAlarm();
    }
  }, 120000);
}

// ── SNOOZE / DISMISS ────────────────────────────────────────────────────
document.getElementById('snooze-btn').addEventListener('click', () => {
  stopRing();
  document.getElementById('ringing-overlay').classList.remove('open');
  if (!ringSnoozeTarget) return;

  // Schedule snooze in 5 minutes using a one-off
  const snoozeAt = new Date(Date.now() + 5 * 60 * 1000);
  const snoozeAlarm = {
    ...ringSnoozeTarget,
    id: 'snooze-' + Date.now(),
    label: (ringSnoozeTarget.label || 'Alarm') + ' (Snooze)',
    hour: snoozeAt.getHours() > 12 ? snoozeAt.getHours() - 12 : snoozeAt.getHours() || 12,
    min: snoozeAt.getMinutes(),
    ampm: snoozeAt.getHours() >= 12 ? 'PM' : 'AM',
    snooze: true,
  };
  alarms.push(snoozeAlarm);
  saveAlarms();
  renderAlarms();
  ringSnoozeTarget = null;
});

document.getElementById('dismiss-btn').addEventListener('click', dismissAlarm);

function dismissAlarm() {
  stopRing();
  document.getElementById('ringing-overlay').classList.remove('open');
  // Remove snooze alarms after dismissal
  alarms = alarms.filter(a => !a.snooze);
  saveAlarms();
  renderAlarms();
  ringSnoozeTarget = null;
}

// ── NEXT ALARM ─────────────────────────────────────────────────────────
function updateNextAlarm() {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();

  let min = Infinity, nextA = null;
  alarms.filter(a => a.enabled).forEach(a => {
    const ah = a.ampm === 'PM' ? (a.hour % 12) + 12 : a.hour % 12;
    let alarmMins = ah * 60 + a.min;
    if (alarmMins <= nowMins) alarmMins += 1440;
    const diff = alarmMins - nowMins;
    if (diff < min) { min = diff; nextA = a; }
  });

  const el = document.getElementById('next-alarm-info');
  if (!nextA) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  const h = Math.floor(min / 60), m = min % 60;
  let txt = 'Next: ' + nextA.hour + ':' + String(nextA.min).padStart(2,'0') + ' ' + nextA.ampm;
  if (h === 0) txt += ` · in ${m}m`;
  else if (m === 0) txt += ` · in ${h}h`;
  else txt += ` · in ${h}h ${m}m`;
  document.getElementById('next-alarm-text').textContent = txt;
}

// ── RENDER ALARMS ──────────────────────────────────────────────────────
function renderAlarms() {
  const list = document.getElementById('alarms-list');
  if (!alarms.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⏰</div><p>No alarms yet.<br>Tap the button below to add one.</p></div>`;
    return;
  }

  // Sort by time
  const sorted = [...alarms].sort((a,b) => {
    const ta = ((a.ampm==='PM'?(a.hour%12)+12:a.hour%12)*60)+a.min;
    const tb = ((b.ampm==='PM'?(b.hour%12)+12:b.hour%12)*60)+b.min;
    return ta - tb;
  });

  list.innerHTML = sorted.map(alarm => {
    const tone = TONES.find(t => t.id === alarm.tone) || TONES[0];
    return `
    <div class="alarm-card ${alarm.enabled ? 'active' : ''}" id="card-${alarm.id}">
      <div class="alarm-time-block">
        <div class="alarm-time">
          ${alarm.hour}:${String(alarm.min).padStart(2,'0')}<span class="ampm"> ${alarm.ampm}</span>
        </div>
        <div class="alarm-label">
          <span class="tone-icon">${tone.icon}</span>
          ${alarm.label || 'Alarm'} &nbsp;·&nbsp; ${tone.label}
        </div>
      </div>
      <div class="alarm-controls">
        <label class="toggle">
          <input type="checkbox" ${alarm.enabled ? 'checked' : ''} onchange="toggleAlarm('${alarm.id}', this.checked)" />
          <div class="toggle-track"></div>
        </label>
        <button class="alarm-delete" onclick="deleteAlarm('${alarm.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}

function toggleAlarm(id, enabled) {
  const a = alarms.find(x => x.id === id);
  if (a) { a.enabled = enabled; saveAlarms(); renderAlarms(); updateNextAlarm(); }
}

function deleteAlarm(id) {
  alarms = alarms.filter(x => x.id !== id);
  saveAlarms(); renderAlarms(); updateNextAlarm();
}

function saveAlarms() {
  localStorage.setItem('alarms', JSON.stringify(alarms));
}

// ── MODAL ──────────────────────────────────────────────────────────────
function buildTonePicker() {
  document.getElementById('tone-picker').innerHTML = TONES.map(t => `
    <div class="tone-option ${t.id === selectedTone ? 'selected' : ''}" onclick="selectTone('${t.id}')">
      <span class="tone-icon">${t.icon}</span>${t.label}
    </div>`).join('');
}

function selectTone(id) {
  selectedTone = id;
  buildTonePicker();
  playTone(id, false);
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Alarm';
  document.getElementById('save-alarm-btn').textContent = 'Set Alarm';
  pickerHour = 7; pickerMin = 0; pickerAmPm = 'AM'; selectedTone = TONES[0].id;
  document.getElementById('alarm-label-input').value = '';
  syncPicker();
  buildTonePicker();
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('open-modal-btn').addEventListener('click', openModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function syncPicker() {
  document.getElementById('tp-hour').textContent = String(pickerHour).padStart(2,'0');
  document.getElementById('tp-min').textContent = String(pickerMin).padStart(2,'0');
  document.getElementById('ampm-am').classList.toggle('selected', pickerAmPm === 'AM');
  document.getElementById('ampm-pm').classList.toggle('selected', pickerAmPm === 'PM');
}

document.getElementById('hr-up').addEventListener('click', () => { pickerHour = pickerHour % 12 + 1; syncPicker(); });
document.getElementById('hr-down').addEventListener('click', () => { pickerHour = ((pickerHour - 2 + 12) % 12) + 1; syncPicker(); });
document.getElementById('min-up').addEventListener('click', () => { pickerMin = (pickerMin + 1) % 60; syncPicker(); });
document.getElementById('min-down').addEventListener('click', () => { pickerMin = (pickerMin - 1 + 60) % 60; syncPicker(); });
document.getElementById('ampm-am').addEventListener('click', () => { pickerAmPm = 'AM'; syncPicker(); });
document.getElementById('ampm-pm').addEventListener('click', () => { pickerAmPm = 'PM'; syncPicker(); });

document.getElementById('save-alarm-btn').addEventListener('click', () => {
  const label = document.getElementById('alarm-label-input').value.trim();
  if (editingId) {
    const a = alarms.find(x => x.id === editingId);
    if (a) { a.hour = pickerHour; a.min = pickerMin; a.ampm = pickerAmPm; a.label = label; a.tone = selectedTone; }
  } else {
    alarms.push({ id: Date.now().toString(), hour: pickerHour, min: pickerMin, ampm: pickerAmPm, label, tone: selectedTone, enabled: true });
  }
  saveAlarms(); renderAlarms(); updateNextAlarm(); closeModal();
});

// ── PWA INSTALL ────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.add('hidden');
});

// ── BOOT ──────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

renderAlarms();
tick();
setInterval(tick, 1000);
// Re-check alarms every second for the exact minute boundary
</script>
</body>
</html>
