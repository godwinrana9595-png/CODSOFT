<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Check Circle and Checkmark -->
  <g filter="url(#shadow)">
    <!-- Inner Check Circle -->
    <circle cx="256" cy="256" r="130" fill="#ffffff" />
    <!-- Checkmark path -->
    <path d="M190 256 l45 45 l90 -90" fill="none" stroke="url(#bgGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <!-- Small details to make it premium -->
  <circle cx="120" cy="120" r="16" fill="#ffffff" opacity="0.4" />
  <circle cx="392" cy="392" r="24" fill="#ffffff" opacity="0.25" />
</svg>
