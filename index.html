<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenTodo - Premium Task Manager</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="ZenTodo is a premium, secure, and offline-first task manager PWA. Organize your day, track priorities, and stay productive.">
  <meta name="theme-color" content="#0f172a">
  
  <!-- Web App Manifest for Android Installation -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <!-- Google Fonts: Outfit (headings) & Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- App Shell -->
  <div class="app-container">
    
    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" class="install-banner hidden">
      <div class="banner-content">
        <img src="./icon.svg" alt="ZenTodo Logo" class="banner-logo">
        <div class="banner-text">
          <h3>Install ZenTodo</h3>
          <p>Add to your home screen for quick offline access!</p>
        </div>
      </div>
      <div class="banner-actions">
        <button id="pwa-btn-install" class="btn btn-primary btn-sm">Install</button>
        <button id="pwa-btn-close" class="btn btn-icon btn-sm" aria-label="Close banner">
          <i data-lucide="x"></i>
        </button>
      </div>
    </div>

    <!-- Header Section -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">
          <i data-lucide="check-check"></i>
        </div>
        <div class="brand-info">
          <h1>ZenTodo</h1>
          <p id="current-date">Today</p>
        </div>
      </div>
      
      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-icon btn-glass" aria-label="Toggle theme">
          <i data-lucide="moon" class="dark-icon"></i>
          <i data-lucide="sun" class="light-icon"></i>
        </button>
      </div>
    </header>

    <!-- Stats & Progress Section -->
    <section class="stats-section">
      <div class="stats-card">
        <div class="stats-header">
          <div class="stats-info">
            <h2>Your Progress</h2>
            <p id="stats-summary">0 of 0 tasks completed</p>
          </div>
          <span id="stats-percentage" class="percentage-badge">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- Search, Sort & Filters Section -->
    <section class="controls-section">
      <!-- Search Box -->
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" placeholder="Search tasks..." autocomplete="off">
        <button id="search-clear" class="btn btn-icon btn-sm hidden" aria-label="Clear search">
          <i data-lucide="x"></i>
        </button>
      </div>

      <!-- Filters & Sorting Bar -->
      <div class="filter-sort-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="active">Active</button>
          <button class="filter-tab" data-filter="completed">Completed</button>
        </div>
        
        <div class="sort-selector">
          <i data-lucide="sliders-horizontal" class="sort-icon"></i>
          <select id="sort-select" aria-label="Sort tasks">
            <option value="createdAt-desc">Newest First</option>
            <option value="createdAt-asc">Oldest First</option>
            <option value="dueDate-asc">Due Date (Soonest)</option>
            <option value="priority-desc">Priority (High to Low)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Main Task Area -->
    <main class="task-area">
      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <div class="empty-illustration">
          <i data-lucide="clipboard-list"></i>
        </div>
        <h3>No tasks here</h3>
        <p>Stay organized by adding your first task using the button below.</p>
        <button id="empty-add-btn" class="btn btn-primary">
          <i data-lucide="plus"></i> Add a Task
        </button>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list"></div>
    </main>

    <!-- Floating Action Button (FAB) for Mobile -->
    <button id="fab-add-task" class="fab" aria-label="Add new task">
      <i data-lucide="plus"></i>
    </button>
  </div>

  <!-- Task Detail Modal (Add/Edit Modal Combined) -->
  <div id="task-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title-text">Create Task</h2>
        <button id="modal-close" class="btn btn-icon" aria-label="Close modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form id="task-form" class="modal-body" novalidate>
        <input type="hidden" id="task-id">
        
        <!-- Task Title -->
        <div class="form-group">
          <label for="task-title" class="form-label">Task Title <span class="required">*</span></label>
          <input type="text" id="task-title" class="form-input" placeholder="e.g., Buy groceries" required maxlength="100">
          <span class="error-msg" id="title-error">Title is required.</span>
        </div>

        <!-- Task Description -->
        <div class="form-group">
          <label for="task-desc" class="form-label">Description</label>
          <textarea id="task-desc" class="form-input form-textarea" placeholder="Add more details about this task..." rows="3" maxlength="500"></textarea>
        </div>

        <div class="form-row">
          <!-- Task Priority -->
          <div class="form-group flex-1">
            <label class="form-label">Priority</label>
            <div class="priority-selector">
              <label class="priority-option low">
                <input type="radio" name="task-priority" value="low" checked>
                <span class="priority-badge-label">Low</span>
              </label>
              <label class="priority-option medium">
                <input type="radio" name="task-priority" value="medium">
                <span class="priority-badge-label">Medium</span>
              </label>
              <label class="priority-option high">
                <input type="radio" name="task-priority" value="high">
                <span class="priority-badge-label">High</span>
              </label>
            </div>
          </div>

          <!-- Task Due Date -->
          <div class="form-group flex-1">
            <label for="task-due-date" class="form-label">Due Date</label>
            <div class="date-picker-wrapper">
              <i data-lucide="calendar" class="date-icon"></i>
              <input type="date" id="task-due-date" class="form-input date-input">
            </div>
          </div>
        </div>

        <!-- Submit Buttons -->
        <div class="modal-footer">
          <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="modal-submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Main Logic -->
  <script src="./app.js"></script>
</body>
</html>
